<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マルチョウ専用 鰹相場データ</title>
    <meta name="apple-mobile-web-app-title" content="マルチョウ 鰹相場データ">
    <link rel="stylesheet" href="index.css?v=20260615-1340">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- 安定版ライブラリへの固定（強制アップデートによる破損防止） -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment@1.0.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.2.1/dist/chartjs-plugin-annotation.min.js"></script>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- アイコン設定 -->
    <link rel="icon" type="image/png" href="marucyou_mark.png">
    <link rel="apple-touch-icon" href="marucyou_mark_white.png">

    <!-- グローバルエラー捕捉（最優先で読み込み） -->
    <script>
        window.addEventListener('error', function (event) {
            console.error("Global Error Caught:", event.error);
            const container = document.getElementById('summary-container');
            if (container) {
                container.innerHTML = `<div style="color:#ff7b72; padding:20px; text-align:left; background:rgba(255,0,0,0.1); border:1px solid #ff7b72; border-radius:10px; margin:20px;">
                    <h3 style="margin-top:0;">🛑致命的なエラーが発生しました</h3>
                    <p>システムの表示が停止しました。以下の情報を開発者にお伝えください：</p>
                    <pre style="white-space:pre-wrap; font-size:12px; background:#0d1117; padding:10px;">${event.error ? event.error.stack : event.message}</pre>
                </div>`;
                const splash = document.getElementById('splash-screen');
                if (splash) splash.classList.add('fade-out');
            }
        });
        window.addEventListener('unhandledrejection', function (event) {
            console.error("Unhandled Promise Rejection:", event.reason);
            const container = document.getElementById('summary-container');
            if (container) {
                container.innerHTML = `<div style="color:#ff7b72; padding:20px; text-align:left; background:rgba(255,0,0,0.1); border:1px solid #ff7b72; border-radius:10px; margin:20px;">
                    <h3 style="margin-top:0;">🛑非同期通信エラーが発生しました</h3>
                    <p>データの読み込みに失敗しました：</p>
                    <pre style="white-space:pre-wrap; font-size:12px; background:#0d1117; padding:10px;">${event.reason}</pre>
                </div>`;
                const splash = document.getElementById('splash-screen');
                if (splash) splash.classList.add('fade-out');
            }
        });
    </script>

    <!-- キャッシュ無効化メタタグ (スマホ対策) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script>
        (function () {
            const VERSION = "20260615-1340";
            try {
                const lastReset = localStorage.getItem('app_reset_version');
                if (lastReset !== VERSION) {
                    console.log("Forcing settings reset for version:", VERSION);
                    localStorage.removeItem('katsuo_app_settings');
                    localStorage.setItem('app_reset_version', VERSION);

                    // 初回のみ強制リロード
                    if (!window.location.search.includes('reload=true')) {
                        window.location.href = window.location.pathname + '?v=' + Date.now() + '&reload=true';
                    }
                }
            } catch (e) {
                console.warn("localStorage is not available.", e);
            }

            // Service Worker の徹底解除
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(registrations => {
                    for (let registration of registrations) {
                        registration.unregister().then(success => {
                            if (success) console.log("Unregistered SW success");
                        });
                    }
                });
            }
        })();
    </script>
</head>

<body class="theme-dark"> <!-- デフォルトはダークモード -->
    <!-- スプラッシュ画面 (リングオービット) -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-orbit-wrapper">
                <div class="splash-ring"></div>
                <div class="splash-ring splash-ring-2"></div>
                <img src="marucyou_mark_white.png" alt="Marucyou Logo" class="splash-logo">
            </div>
            <p class="splash-loading-text">読み込み中<span class="loading-dots"></span></p>
        </div>
    </div>

    <div class="container">
        <header class="app-header">
            <div class="header-visual-container">
                <div class="header-main-title">
                    <img src="marucyou_mark_white.png" alt="Marucyou Logo" class="header-logo-img">
                    <h1>マルチョウ 鰹相場ダッシュボード</h1>
                    <p class="last-updated-text">データ最終更新: <span id="last-update-time">取得中...</span></p>
                </div>
                <div class="filter-controls-container">
                    <div class="header-action-row">
                        <div class="system-group">
                            <button id="btn-holiday-list" class="btn-system"><span class="icon">📅</span> 定休日</button>
                            <button id="btn-species-list" class="btn-system"><span class="icon">🪵</span> 種類表</button>
                            <button id="btn-refresh" class="btn-system"><span class="icon">🔄</span> 更新</button>
                            <button id="btn-settings" class="btn-system"><span class="icon">⚙️</span> 設定</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- 設定モーダル -->
        <div id="settings-modal" class="modal-overlay">
            <div class="settings-content">
                <div class="settings-header">
                    <h3>⚙️ アプリ設定</h3>
                    <button id="settings-close" class="btn-close">&times;</button>
                </div>
                <div class="settings-body">
                    <!-- テーマ選択 (3色にスリム化) -->
                    <section class="settings-section">
                        <h4>🎨 表示テーマ</h4>
                        <div class="theme-grid">
                            <button class="theme-option" data-theme="dark"><span class="theme-preview dark"></span>Dark</button>
                            <button class="theme-option" data-theme="light"><span class="theme-preview light"></span>Light</button>
                            <button class="theme-option" data-theme="ocean"><span class="theme-preview ocean"></span>Ocean</button>
                        </div>
                    </section>

                    <!-- 文字サイズ -->
                    <section class="settings-section">
                        <h4>📏 文字サイズ</h4>
                        <div class="setting-row">
                            <button class="btn-setting-toggle" data-font="small">小</button>
                            <button class="btn-setting-toggle active" data-font="medium">中</button>
                            <button class="btn-setting-toggle" data-font="large">大</button>
                        </div>
                    </section>

                    <!-- 追加オプション -->
                    <section class="settings-section">
                        <h4>🚀 表示オプション</h4>
                        <div class="option-list">
                            <label class="option-item">
                                <span>港の表示: 枕崎</span>
                                <input type="checkbox" id="check-port-makurazaki" checked>
                            </label>
                            <label class="option-item">
                                <span>港の表示: 焼津</span>
                                <input type="checkbox" id="check-port-yaizu" checked>
                            </label>
                            <label class="option-item">
                                <span>港の表示: 山川</span>
                                <input type="checkbox" id="check-port-yamagawa" checked>
                            </label>
                        </div>
                    </section>
                </div>
            </div>
        </div>

        <!-- 鰹節種類表モーダル（画像表示） -->
        <div id="species-modal" class="modal-overlay">
            <div class="species-img-modal">
                <div class="species-img-header">
                    <span class="species-img-title">🪵 鰹節種別リスト</span>
                    <button id="species-close" class="btn-close">&times;</button>
                </div>
                <div class="species-img-body">
                    <img src="katsuo_species_guide.png" alt="鰹節種別リスト" class="species-guide-img">
                </div>
            </div>
        </div>

        <!-- 定休日カレンダーモーダル（画像表示） -->
        <div id="holiday-modal" class="modal-overlay">
            <div class="species-img-modal">
                <div class="species-img-header">
                    <span class="species-img-title">📅 令和8年度定休日表</span>
                    <button id="holiday-close" class="btn-close">&times;</button>
                </div>
                <div class="species-img-body">
                    <img src="holiday_calendar.jpg" alt="令和8年度定休日表" class="species-guide-img">
                </div>
            </div>
        </div>

        <nav class="main-tabs">
            <button class="tab-item active" data-tab="summary">📈 最新相場・グラフ</button>
            <button class="tab-item" data-tab="bid-schedule">🚢 入札予定</button>
        </nav>

        <!-- 最新相場・グラフビュー -->
        <div id="view-summary" class="tab-view active">
            <!-- 3市場最新相場カード -->
            <div class="dashboard-section-title">📊 主要3市場 最新相場サマリー</div>
            <div id="summary-container" class="summary-grid">
                <p>最新データを分析中...</p>
            </div>

            <!-- メイン折れ線グラフ -->
            <div class="chart-section-wrapper">
                <div class="chart-controls-header">
                    <div class="chart-title-group">
                        <span class="chart-section-icon">📈</span>
                        <span class="chart-section-title">相場推移グラフ</span>
                        <select id="chart-size-selector" class="chart-size-select">
                            <option value="2.5kg上" selected>2.5kg上 (主力サイズ)</option>
                            <option value="1.8kg上">1.8kg上</option>
                            <option value="4.5kg上">4.5kg上</option>
                            <option value="1.8kg下">1.8kg下</option>
                        </select>
                        <select id="chart-compare-selector" class="chart-size-select">
                            <option value="none" selected>比較: なし</option>
                            <option value="1m">比較: 1ヶ月前</option>
                            <option value="3m">比較: 3ヶ月前</option>
                            <option value="6m">比較: 半年前</option>
                            <option value="1y">比較: 1年前</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <button class="btn-filter" data-range="7">7日間</button>
                        <button class="btn-filter active" data-range="30">30日間</button>
                        <button class="btn-filter" data-range="90">90日間</button>
                        <button class="btn-filter" data-range="all">全期間</button>
                    </div>
                </div>
                <div class="main-chart-container">
                    <canvas id="main-chart"></canvas>
                </div>
            </div>

            <!-- 下部エリア：全サイズ一覧 -->
            <div class="bottom-dashboard-layout">
                <div class="market-list-panel" style="grid-column: 1 / -1;">
                    <details class="market-list-details">
                        <summary class="market-list-summary">
                            <span>📋 全サイズ最新相場一覧 (クリックして開閉)</span>
                        </summary>
                        <div class="table-responsive" style="margin-top: 15px;">
                            <table class="market-all-sizes-table">
                                <thead>
                                    <tr>
                                        <th>市場</th>
                                        <th>サイズ</th>
                                        <th>最新価格</th>
                                        <th>前回比</th>
                                        <th>水揚量</th>
                                        <th>入港船</th>
                                        <th>取引日</th>
                                    </tr>
                                </thead>
                                <tbody id="all-sizes-table-body">
                                    <tr><td colspan="7" style="text-align:center;">データを読み込み中...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </details>
                </div>
            </div>
        </div>

        <!-- 入札予定ビュー -->
        <div id="view-bid-schedule" class="tab-view">
            <div class="bid-section">
                <div id="latest-bid-container">
                    <!-- 最新の入札予定を表示 -->
                </div>

                <div class="archive-section">
                    <details>
                        <summary class="archive-summary">📁 過去の入札予定アーカイブを表示</summary>
                        <div id="archive-bid-container">
                            <!-- 過去のデータを表示 -->
                        </div>
                    </details>
                </div>
            </div>
        </div>

        <!-- 詳細表示モーダル -->
        <div id="detail-modal" class="modal-overlay">
            <div class="modal-content">
                <button id="modal-close" class="modal-close-btn">&times;</button>
                <div id="modal-body">
                    <!-- JSで詳細データが挿入されます -->
                </div>
            </div>
        </div>

        <!-- 相場メモ入力モーダル -->
        <div id="memo-modal" class="modal-overlay">
            <div class="modal-content">
                <div class="memo-modal-header">
                    <h3>📝 相場メモ</h3>
                    <span id="memo-date" class="memo-date-label"></span>
                    <span id="memo-port" data-date="" data-port=""></span>
                </div>
                <textarea id="memo-textarea" class="memo-textarea" placeholder="例：大型高。第88永盛丸の入港で水揚げ増加見込み。"
                    rows="5"></textarea>
                <div class="memo-modal-footer">
                    <button id="memo-cancel-btn" class="btn-filter">キャンセル</button>
                    <button id="memo-save-btn" class="btn-filter"
                        style="background:var(--accent-color);color:white;border-color:var(--accent-color)">保存</button>
                </div>
            </div>
        </div>

        <footer>
            <p>Data Source: 各市況データ</p>
            <p>&copy; 2026 Marucyou Skipjack Analytics</p>
        </footer>
    </div>

    <script src="dashboard.js?v=20260615-1340"></script>
</body>

</html>
